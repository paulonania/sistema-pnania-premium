<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    label {
      font-size: 14px;
      font-weight: 500;
      color: rgb(49, 51, 63);
      display: block;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      min-height: 95px;
      box-sizing: border-box;
      border: 1px solid rgba(49, 51, 63, 0.2);
      border-radius: 4px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      color: rgb(49, 51, 63);
      resize: vertical;
      background-color: rgb(255, 255, 255);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #0f3a61;
      box-shadow: 0 0 0 1px #0f3a61;
    }
  </style>
</head>
<body>
  <label id="label-el"></label>
  <textarea id="textarea-el" placeholder=""></textarea>
  <script>
    let key = "";
    let defaultValue = "";
    let lastSentValue = null;

    const textarea = document.getElementById("textarea-el");
    const label = document.getElementById("label-el");

    function updateHeight() {
      // Notify Streamlit of the iframe's new height
      const height = document.body.scrollHeight || document.documentElement.scrollHeight;
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: height
      }, "*");
    }

    function adjustTextareaHeight() {
      textarea.style.height = "auto";
      textarea.style.height = (textarea.scrollHeight + 2) + "px";
      updateHeight();
    }

    function sendToStreamlit(value) {
      lastSentValue = value;
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: value
      }, "*");
    }

    // Listen for render messages from Streamlit
    window.addEventListener("message", function(event) {
      if (event.data.type === "streamlit:render") {
        const args = event.data.args;
        key = args.key;
        defaultValue = args.defaultValue || "";
        
        label.textContent = args.label || "";
        textarea.placeholder = args.placeholder || "";
        
        // Handle external updates (like CSV load or clear data)
        if (lastSentValue !== null && defaultValue !== lastSentValue) {
          textarea.value = defaultValue;
          localStorage.setItem("pnania_" + key, defaultValue);
          lastSentValue = defaultValue;
          adjustTextareaHeight();
          return;
        }

        // Initialize value on first mount
        if (lastSentValue === null) {
          const cached = localStorage.getItem("pnania_" + key);
          if (cached !== null) {
            textarea.value = cached;
            lastSentValue = cached;
            sendToStreamlit(cached);
          } else {
            textarea.value = defaultValue;
            lastSentValue = defaultValue;
          }
        }

        adjustTextareaHeight();
      }
    });

    // Save to localStorage immediately on every keystroke
    textarea.addEventListener("input", function(e) {
      const val = e.target.value;
      if (key) {
        localStorage.setItem("pnania_" + key, val);
      }
      adjustTextareaHeight();
    });

    // Send to Streamlit with debounce to avoid laggy typing
    let debounceTimer;
    textarea.addEventListener("input", function(e) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        sendToStreamlit(e.target.value);
      }, 300);
    });

    textarea.addEventListener("blur", function(e) {
      sendToStreamlit(e.target.value);
    });

    // Notify Streamlit that the component is ready
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:componentReady",
      apiVersion: 1
    }, "*");
  </script>
</body>
</html>
